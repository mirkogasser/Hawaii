<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dein perfekter Tag auf Hawaii</title>
  <style>
    :root {
      --bg1: #f7c97a;
      --bg2: #ff8f70;
      --bg3: #4568dc;
      --card: rgba(255,255,255,0.16);
      --card-strong: rgba(255,255,255,0.24);
      --text: #fffdf8;
      --text-soft: rgba(255,253,248,0.8);
      --shadow: 0 20px 50px rgba(10, 24, 60, 0.25);
      --radius: 28px;
      --accent: #fff4d7;
      --accent-dark: #5c3d1f;
      --danger: rgba(255,255,255,0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(140deg, var(--bg1) 0%, var(--bg2) 38%, var(--bg3) 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      border-radius: 999px;
      filter: blur(40px);
      opacity: 0.32;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      width: 260px;
      height: 260px;
      background: rgba(255,255,255,0.38);
      top: 60px;
      right: -70px;
    }

    body::after {
      width: 220px;
      height: 220px;
      background: rgba(255,214,153,0.45);
      bottom: 40px;
      left: -60px;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 18px 42px;
    }

    .shell {
      backdrop-filter: blur(18px);
      background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.10));
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 36px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topbar {
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.16);
      background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02));
    }

    .topbar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .eyebrow {
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.74rem;
      color: var(--text-soft);
    }

    h1 {
      margin: 8px 0 0;
      font-size: clamp(1.8rem, 4vw, 2.7rem);
      line-height: 1.06;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 1rem;
      line-height: 1.5;
      max-width: 55ch;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
      color: var(--text);
      font-size: 0.92rem;
      border: 1px solid rgba(255,255,255,0.16);
      white-space: nowrap;
    }

    .progress-wrap {
      margin-top: 14px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.88rem;
      color: var(--text-soft);
      margin-bottom: 8px;
      gap: 10px;
      flex-wrap: wrap;
    }

    .progress {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      overflow: hidden;
    }

    .progress > span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,244,215,1), rgba(255,255,255,0.88));
      transition: width 280ms ease;
    }

    .content {
      padding: 20px;
      display: grid;
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .story {
      font-size: 1rem;
      color: var(--text-soft);
      line-height: 1.7;
      margin: 0;
    }

    .question {
      margin: 10px 0 0;
      font-size: clamp(1.25rem, 3.2vw, 1.8rem);
      line-height: 1.2;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid rgba(255,255,255,0.18);
      background: linear-gradient(180deg, rgba(255,255,255,0.20), rgba(255,255,255,0.12));
      color: var(--text);
      border-radius: 22px;
      padding: 16px;
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .option:hover,
    .option:focus-visible {
      transform: translateY(-2px);
      background: linear-gradient(180deg, rgba(255,255,255,0.28), rgba(255,255,255,0.16));
      border-color: rgba(255,255,255,0.34);
      outline: none;
    }

    .option-title {
      display: block;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .option-text {
      display: block;
      color: var(--text-soft);
      line-height: 1.45;
      font-size: 0.95rem;
    }

    .remaining {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text);
      font-size: 0.92rem;
    }

    .footer-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ghost,
    .primary {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 13px 18px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 180ms ease, opacity 180ms ease, background 180ms ease;
    }

    .ghost:hover,
    .primary:hover,
    .ghost:focus-visible,
    .primary:focus-visible {
      transform: translateY(-2px);
      outline: none;
    }

    .ghost {
      background: rgba(255,255,255,0.14);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.16);
    }

    .primary {
      background: var(--accent);
      color: var(--accent-dark);
    }

    .result {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.24), rgba(255,255,255,0.13));
    }

    .result::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      right: -70px;
      top: -50px;
      border-radius: 999px;
      background: rgba(255,255,255,0.22);
      filter: blur(6px);
    }

    .result-emoji {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 10px;
    }

    .result-title {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      margin: 0;
      line-height: 1.08;
    }

    .result-copy {
      margin: 12px 0 0;
      color: var(--text-soft);
      line-height: 1.7;
      max-width: 54ch;
    }

    .highlight {
      margin-top: 16px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.14);
    }

    .highlight strong {
      display: block;
      margin-bottom: 7px;
      font-size: 1rem;
    }

    .tiny {
      margin-top: 12px;
      color: rgba(255,253,248,0.72);
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 5;
    }

    .confetti-piece {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 18px;
      opacity: 0.9;
      border-radius: 3px;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0.1;
      }
    }

    @media (max-width: 640px) {
      .app { padding: 14px 12px 28px; }
      .content { padding: 14px; }
      .topbar { padding: 16px 14px 12px; }
      .card { padding: 16px; }
    }
  </style>
</head>

    function makeResultNode(activityId) {

        type: "result",

        candidates: [activityId]

    const pathDepthMap = computePathDepths();

    function computePathDepths() {
      const map = {};
      function walk(nodeId, depth) {
        const node = nodes[nodeId];
        if (!node) return;
        map[nodeId] = Math.max(map[nodeId] || 0, depth);
        if (node.type === "intro" && node.next) {
          walk(node.next, depth + 1);
        }
        if (node.type === "question") {
          node.options.forEach(opt => walk(opt.next, depth + 1));
        }
      }
      walk("intro", 0);
      return map;
    }

        document.getElementById("resetAction").onclick = reset;
      }

      if (node.type === "question") {
        appEl.innerHTML = `
          <section class="card">
            <div class="eyebrow">${node.stepLabel}</div>
            <p class="story">${node.story}</p>
            <h2 class="question">${node.question}</h2>
          </section>
          <section class="card">
            <div class="remaining">${renderCandidates(node.candidates)}</div>
          </section>
          <section class="options">
            ${node.options.map((opt, index) => `
              <button class="option" data-index="${index}">
                <span class="option-title">${opt.title}</span>
                <span class="option-text">${opt.text}</span>
              </button>
            `).join("")}
          </section>
          <section class="footer-actions">
            <button class="ghost" id="backAction">Zurück</button>
            <button class="ghost" id="resetAction">Neu starten</button>
          </section>
        `;

        appEl.querySelectorAll(".option").forEach(btn => {
          btn.onclick = () => {
            const index = Number(btn.dataset.index);
            const option = node.options[index];
            state.history.push(state.currentNode);
            saveState();
            goTo(option.next);
          };
        });

        document.getElementById("backAction").onclick = back;
        document.getElementById("resetAction").onclick = reset;
      }

      if (node.type === "result") {
        const activity = activities[node.activityId];
        appEl.innerHTML = `
          <section class="card result">
            <div class="result-emoji">${activity.emoji}</div>
            <div class="eyebrow">Dein Geschenk</div>
            <h2 class="result-title">${activity.title}</h2>
            <p class="result-copy">${activity.description}</p>
            <div class="highlight">
              <strong>Auflösung</strong>
              <div>${activity.giftText}</div>
            </div>
            <p class="tiny">Tipp: Du kannst den Text im HTML später noch personalisieren, zum Beispiel mit ihrem Namen oder einer eigenen Widmung.</p>
          </section>
          <section class="card">
            <div class="eyebrow">So bist du hier gelandet</div>
            <p class="story">Schritt für Schritt wurden alle anderen Möglichkeiten ausgeschlossen, bis nur noch dieses Erlebnis übrig geblieben ist.</p>
            <div class="remaining">${renderCandidates([node.activityId])}</div>
          </section>
          <section class="footer-actions">
            <button class="ghost" id="backAction">Zurück</button>
            <button class="primary" id="resetAction">Noch einmal spielen</button>
          </section>
        `;
        document.getElementById("backAction").onclick = back;
        document.getElementById("resetAction").onclick = reset;
        launchConfetti();
      }
    }

    function updateTop(node) {
      const currentDepth = pathDepthMap[state.currentNode] || 0;
      const maxDepth = 5;
      const percentage = Math.min(100, Math.max(6, (currentDepth / maxDepth) * 100));
      progressBar.style.width = `${node.type === "result" ? 100 : percentage}%`;

      if (node.type === "intro") {
        progressLabel.textContent = "Bereit zum Start";
      } else if (node.type === "result") {
        progressLabel.textContent = "Geschenk gefunden";
      } else {
        progressLabel.textContent = node.stepLabel;
      }

      const candidateCount = node.candidates?.length || 0;
      remainingLabel.textContent = candidateCount === 1
        ? "1 Möglichkeit übrig"
        : `${candidateCount} Möglichkeiten übrig`;
    }

    function renderCandidates(candidateIds) {
      return candidateIds.map(id => {
        const item = activities[id];
        return `<span class="pill">${item.emoji} ${item.short}</span>`;
      }).join("");
    }

    function goTo(nodeId) {
      state.currentNode = nodeId;
      saveState();
      render();
    }

    function back() {
      if (!state.history.length) {
        goTo("intro");
        return;
      }
      state.currentNode = state.history.pop();
      saveState();
      render();
    }

    function reset() {
      state = { currentNode: "intro", history: [] };
      saveState();
      clearConfetti();
      render();
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    function launchConfetti() {
      clearConfetti();
      const pieces = 28;
      for (let i = 0; i < pieces; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-piece";
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.background = ["#fff4d7", "#ffffff", "#ffd79b", "#ffe7bf"][i % 4];
        piece.style.animationDuration = `${3 + Math.random() * 2.8}s`;
        piece.style.animationDelay = `${Math.random() * 0.6}s`;
        piece.style.transform = `translateY(0) rotate(${Math.random() * 360}deg)`;
        confettiEl.appendChild(piece);
      }
      setTimeout(clearConfetti, 5200);
    }

    function clearConfetti() {
      confettiEl.innerHTML = "";
    }
  </script>
</body>
</html>
