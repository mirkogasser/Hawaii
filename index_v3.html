      inset: auto;

      height: 320px;
      right: -60px;
      top: -60px;

      outline: none;
    }

    .petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 3;
    }

    .petal {
      position: absolute;
      top: -20px;
      width: 14px;
      height: 20px;
      border-radius: 14px 14px 14px 2px;
      opacity: 0.92;
      animation: fall linear forwards;
      filter: blur(0.2px);
    }

    @keyframes fall {
      to {
        transform: translateY(112vh) rotate(680deg);
        opacity: 0.15;
      }
    }

    @media (max-width: 700px) {

      .content { padding: 14px; }
      .card { padding: 18px; }
      .question { font-size: 1.55rem; }
      .image-wrap img { max-height: 280px; }
    }
  </style>

Cgz3lhgwrwflvTRKYAAAA=="}};
    const STORAGE_KEY = "hawaii-gift-app-v2-state";
    const appEl = document.getElementById("app");
    const progressBar = document.getElementById("progressBar");
    const progressLabel = document.getElementById("progressLabel");
    const headerTitle = document.getElementById("headerTitle");
    const petalsEl = document.getElementById("petals");

    let state = loadState() || { current: "intro", history: [] };
    const depthMap = buildDepthMap();

    function buildDepthMap() {
      const map = {};
      function walk(id, depth) {
        const node = DATA.nodes[id];
        if (!node) return;
        if (map[id] == null || depth > map[id]) map[id] = depth;
        (node.buttons || []).forEach(btn => {
          if (btn.target) walk(btn.target, depth + 1);
        });
      }
      walk("intro", 0);
      return map;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderImage(image) {
      if (!image) return "";
      const src = DATA.images[image.src];
      if (!src) return "";
      return `<section class="image-wrap"><img src="${src}" alt="${escapeHtml(image.alt || "")}" /></section>`;
    }

    function renderButtons(buttons) {
      return `<section class="options">${buttons.map((btn, index) => `
        <button class="option ${btn.style === "primary" ? "primary" : ""}" data-index="${index}">
          <span class="option-title">${escapeHtml(btn.title)}</span>
          ${btn.text ? `<span class="option-copy">${escapeHtml(btn.text)}</span>` : ""}
        </button>
      `).join("")}</section>`;
    }

    function renderFooter(node) {
      if (node.kind === "intro") {
        return `<section class="footer-actions"><button class="ghost-btn" id="resetBtn">Neu starte</button></section>`;
      }
      if (node.kind === "result") {
        return `<section class="footer-actions">
          <button class="ghost-btn" id="backBtn">Zrügg</button>
          <button class="ghost-btn" id="resetBtn">Nomau spiele</button>
        </section>`;
      }
      return `<section class="footer-actions">
        <button class="ghost-btn" id="backBtn">Zrügg</button>
        <button class="ghost-btn" id="resetBtn">Neu starte</button>
      </section>`;
    }

    function renderIntro(node) {
      return `
        <section class="card">
          <div class="eyebrow">☀️ Aloha</div>
          <div class="hero-subtitle">${node.subtitle}</div>
          <p class="story hero-story">${node.story}</p>
        </section>
        ${renderButtons(node.buttons)}
        ${renderFooter(node)}
      `;
    }

    function renderQuestion(node) {
      return `
        <section class="card">
          <div class="eyebrow">🌊 ${escapeHtml(node.label || "")}</div>
          <p class="story">${escapeHtml(node.story || "")}</p>
          <h2 class="question">${escapeHtml(node.question || "")}</h2>
        </section>
        ${renderImage(node.image)}
        ${renderButtons(node.buttons || [])}
        ${renderFooter(node)}
      `;
    }

    function renderResult(node) {
      return `
        ${renderImage(node.image)}
        <section class="card result-card">
          <div class="eyebrow result-label">🎁 ${escapeHtml(node.label || "Dein Geschenk")}</div>
          <h2 class="result-title">${escapeHtml(node.title || "")}</h2>
          <p class="result-description">${escapeHtml(node.description || "")}</p>
          <div class="reveal-box">
            <strong>Auflösung</strong>
            <p class="reveal-copy">${escapeHtml(node.reveal || "")}</p>
          </div>
        </section>
        ${renderFooter(node)}
      `;
    }

    function bindNodeButtons(node) {
      const optionButtons = appEl.querySelectorAll(".option");
      optionButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          const index = Number(btn.dataset.index);
          const action = (node.buttons || [])[index];
          if (!action) return;
          if (action.action === "back") {
            back();
            return;
          }
          if (action.target) {
            if (state.current) state.history.push(state.current);
            goTo(action.target);
          }
        });
      });

      const backBtn = document.getElementById("backBtn");
      const resetBtn = document.getElementById("resetBtn");

      if (backBtn) backBtn.addEventListener("click", back);
      if (resetBtn) resetBtn.addEventListener("click", reset);
    }

    function updateProgress(nodeId, node) {
      headerTitle.textContent = DATA.nodes.intro.title;
      const maxDepth = 5;
      const depth = depthMap[nodeId] || 0;
      const percent = node.kind === "result" ? 100 : Math.max(6, Math.min(96, (depth / maxDepth) * 100));
      progressBar.style.width = percent + "%";
      progressLabel.textContent = node.kind === "result"
        ? "Gschänk gfunde"
        : (node.label || "Bereit");
    }

    function launchPetals() {
      petalsEl.innerHTML = "";
      const colors = ["#ffd166", "#ff8fab", "#fee440", "#8be9fd", "#f7b267", "#ffcad4"];
      for (let i = 0; i < 26; i++) {
        const petal = document.createElement("div");
        petal.className = "petal";
        petal.style.left = (Math.random() * 100) + "%";
        petal.style.background = colors[i % colors.length];
        petal.style.animationDuration = (3.6 + Math.random() * 2.8) + "s";
        petal.style.animationDelay = (Math.random() * 0.7) + "s";
        petal.style.transform = `rotate(${Math.random() * 360}deg)`;
        petalsEl.appendChild(petal);
      }
      setTimeout(() => petalsEl.innerHTML = "", 5400);
    }

    function goTo(id) {
      state.current = id;
      saveState();
      render();
    }

    function back() {
      if (!state.history.length) {
        goTo("intro");
        return;
      }
      state.current = state.history.pop();
      saveState();
      render();
    }

    function reset() {
      state = { current: "intro", history: [] };
      saveState();
      petalsEl.innerHTML = "";
      render();
    }

    function render() {
      const node = DATA.nodes[state.current];
      if (!node) return;
      updateProgress(state.current, node);

      if (node.kind === "intro") {
        appEl.innerHTML = renderIntro(node);
      } else if (node.kind === "question") {
        appEl.innerHTML = renderQuestion(node);
      } else if (node.kind === "result") {
        appEl.innerHTML = renderResult(node);
        launchPetals();
      }
      bindNodeButtons(node);
    }

    render();
  </script>
</body>
